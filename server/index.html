<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majordomo</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <div id="app">
    <header>
      <h1>Majordomo</h1>
      <button id="session-btn" title="Sessions">Sessions</button>
      <button id="settings-btn" title="Settings">&#9881;</button>
      <div id="status">
        <div id="status-dot"></div>
        <span id="status-text">disconnected</span>
      </div>
      <div id="session-dropdown">
        <div class="session-label">Recent Sessions</div>
      </div>
    </header>

    <div id="messages"></div>

    <div id="input-area">
      <textarea id="input" placeholder="Ask me anything..." rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Config Modal -->
  <div id="config-modal">
    <div id="config-form">
      <h2>LLM Configuration</h2>

      <div class="config-field">
        <label for="cfg-provider">Provider</label>
        <select id="cfg-provider">
          <option value="auto">Auto-detect</option>
          <option value="ollama">Ollama</option>
          <option value="omlx">Omlx</option>
          <option value="lmstudio">LM Studio</option>
          <option value="llamacpp">llama.cpp</option>
        </select>
      </div>

      <div class="config-field">
        <label for="cfg-model">Model name (leave empty for default)</label>
        <input type="text" id="cfg-model" placeholder="e.g. llama3.2">
      </div>

      <div class="config-field">
        <label for="cfg-url">Server URL (leave empty for default)</label>
        <input type="text" id="cfg-url" placeholder="e.g. http://localhost:11434">
      </div>

      <div class="config-field">
        <label for="cfg-apikey">API Key (optional)</label>
        <input type="password" id="cfg-apikey" placeholder="Bearer token">
      </div>

      <div class="config-actions">
        <button id="cfg-detect">Detect Server</button>
        <button id="cfg-save" class="primary">Save</button>
        <button id="cfg-cancel">Cancel</button>
      </div>
      <div id="config-status"></div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const settingsBtn = document.getElementById('settings-btn');
    const sessionBtn = document.getElementById('session-btn');
    const sessionDropdown = document.getElementById('session-dropdown');
    const configModal = document.getElementById('config-modal');
    const configStatus = document.getElementById('config-status');

    // Config form elements
    const cfgProvider = document.getElementById('cfg-provider');
    const cfgModel = document.getElementById('cfg-model');
    const cfgUrl = document.getElementById('cfg-url');
    const cfgApiKey = document.getElementById('cfg-apikey');
    const cfgDetect = document.getElementById('cfg-detect');
    const cfgSave = document.getElementById('cfg-save');
    const cfgCancel = document.getElementById('cfg-cancel');

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // Session state — extracted from URL on page load.
    let currentSessionId = extractSessionIdFromURL();

    // Extract session ID from URL: /chat/<id> → session ID
    function extractSessionIdFromURL() {
      const path = window.location.pathname;
      const match = path.match(/^\/chat\/([a-f0-9]{8})$/);
      return match ? match[1] : null;
    }

    // Update browser URL to reflect the current session.
    function updateSessionURL(sessionId) {
      if (sessionId) {
        history.pushState(null, '', '/chat/' + sessionId);
      }
    }

    // Session button toggle
    sessionBtn.addEventListener('click', () => {
      sessionDropdown.classList.toggle('open');
      if (sessionDropdown.classList.contains('open')) {
        loadSessions();
      }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!sessionDropdown.contains(e.target) && e.target !== sessionBtn) {
        sessionDropdown.classList.remove('open');
      }
    });

    // Load sessions on page load.
    loadSessions();

    // If we navigated to an existing session, load its history.
    if (currentSessionId) {
      loadSessionMessages(currentSessionId);
    }

    function loadSessions() {
      fetch('/api/sessions')
        .then(res => res.json())
        .then(summaries => {
          const labelEl = sessionDropdown.querySelector('.session-label');
          // Clear existing session items (keep the label)
          const existingItems = sessionDropdown.querySelectorAll('.session-item');
          existingItems.forEach(item => item.remove());

          // Add "New Session" button at top.
          // Navigates to / which redirects to the latest session.
          const newBtn = document.createElement('div');
          newBtn.className = 'session-item new-session';
          newBtn.textContent = 'New Session';
          newBtn.onclick = () => {
            currentSessionId = null;
            sessionDropdown.classList.remove('open');
            window.location.href = '/';
          };
          sessionDropdown.insertBefore(newBtn, labelEl?.nextSibling || sessionDropdown.firstChild);

          if (summaries.length === 0) return;

          for (const s of summaries) {
            const item = document.createElement('div');
            item.className = 'session-item';
            const title = s.title || s.id;
            item.textContent = title;
            item.title = s.id;
            item.onclick = () => {
              currentSessionId = s.id;
              sessionDropdown.classList.remove('open');
              updateSessionURL(s.id);
              loadSessionMessages(s.id);
            };
            sessionDropdown.insertBefore(item, labelEl?.nextSibling || sessionDropdown.firstChild);
          }
        })
        .catch(() => { });
    }

    function clearMessages() {
      messagesEl.innerHTML = '';
    }

    function loadSessionMessages(sessionId) {
      fetch(`/api/sessions/${sessionId}/history`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(events => {
          // Render each message event from history.
          for (const ev of events) {
            if (ev.Type === 'message' && ev.Message) {
              const msg = JSON.parse(ev.Message);
              appendMessage(msg.Role, msg.Content, msg.ToolCalls);
            }
          }
        })
        .catch(() => { });
    }

    // Render a single message (user or assistant) to the UI.
    function appendMessage(role, content, toolCalls) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content || '';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(state, text) {
      statusDot.className = state;
      statusText.textContent = text;
    }

    // ===== Chat State =====
    let turn = 0; // incrementing turn counter for unique IDs

    function sendMessage() {
      const query = inputEl.value.trim();
      if (!query) return;

      const thisTurn = turn;
      turn++;

      // Add user message with unique ID
      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.id = `user-${thisTurn}`;
      userDiv.textContent = query;
      messagesEl.appendChild(userDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Clear input
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      setStatus('connected', 'connecting...');

      // Create assistant bubble (starts as typing dots, filled in by stream)
      const responseDiv = document.createElement('div');
      responseDiv.className = 'message assistant typing';
      responseDiv.id = `response-${thisTurn}`;
      responseDiv.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(responseDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Connect to SSE stream via fetch, passing session ID.
      useFetchStream(query, thisTurn);
    }

    function useFetchStream(query, thisTurn) {
      let url = `/api/stream?query=${encodeURIComponent(query)}`;
      if (currentSessionId) {
        url += `&session=${currentSessionId}`;
      }

      fetch(url, {
        method: 'GET',
        headers: { 'Accept': 'text/event-stream' }
      })
        .then(response => {
          if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
          }
          setStatus('connected', 'thinking...');

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          function readChunk() {
            reader.read().then(({ done, value }) => {
              if (done) {
                sendBtn.disabled = false;
                setStatus('', 'disconnected');
                return;
              }

              buffer += decoder.decode(value, { stream: true });

              // Process complete SSE frames
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';

              for (const line of lines) {
                processSSELine(line.trim(), thisTurn);
              }

              readChunk();
            });
          }

          readChunk();
        })
        .catch(err => {
          // Show error in the response bubble
          const el = document.getElementById(`response-${thisTurn}`);
          if (el) {
            el.classList.remove('typing');
            el.textContent = `Error: ${err.message}`;
          }
          sendBtn.disabled = false;
          setStatus('error', 'error');
        });
    }

    function processSSELine(line, thisTurn) {
      if (!line) return;

      // Parse event type
      if (line.startsWith('event: ')) {
        currentEventType = line.slice(7).trim();
        return;
      }

      // Parse data
      if (line.startsWith('data: ')) {
        const data = line.slice(6);
        if (data === '[DONE]') {
          setStatus('', 'disconnected');
          return;
        }
        try {
          const parsed = JSON.parse(data);
          parsed.type = currentEventType;
          handleServerEvent(parsed, thisTurn);
        } catch (e) {
          // Not JSON, ignore
        }
      }
    }

    function handleServerEvent(event, thisTurn) {
      // Handle session event — learn the session ID from the server.
      if (event.type === 'session') {
        const sid = event.id;
        if (sid) {
          if (!currentSessionId) {
            currentSessionId = sid;
            // Refresh the dropdown to show the new session.
            loadSessions();
          }
          // Always update URL to reflect the server's session.
          updateSessionURL(sid);
        }
        return;
      }

      const responseEl = document.getElementById(`response-${thisTurn}`);
      if (!responseEl) return;

      if (event.type === 'message' || event.content) {
        const content = event.content || (event.message && event.message.content) || '';
        if (content) {
          responseEl.classList.remove('typing');
          responseEl.textContent = content;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
      if (event.type === 'error') {
        responseEl.classList.remove('typing');
        responseEl.textContent = `Error: ${event.message || 'Unknown error'}`;
        sendBtn.disabled = false;
        setStatus('error', 'error');
      }
    }

    // ===== Config Modal =====

    settingsBtn.addEventListener('click', () => {
      loadConfig();
      configModal.classList.add('open');
    });

    cfgCancel.addEventListener('click', () => {
      configModal.classList.remove('open');
      clearConfigStatus();
    });

    configModal.addEventListener('click', (e) => {
      if (e.target === configModal) {
        configModal.classList.remove('open');
        clearConfigStatus();
      }
    });

    cfgDetect.addEventListener('click', () => {
      // Try to detect by hitting the stream endpoint with a probe query
      // Actually, we can't auto-detect from the browser. Just populate defaults.
      cfgProvider.value = 'auto';
      cfgModel.value = '';
      cfgUrl.value = '';
      setConfigStatus('Set to auto-detect. The server will probe for local LLMs on startup.', 'success');
    });

    cfgSave.addEventListener('click', () => {
      const cfg = {
        llm: {
          provider: cfgProvider.value,
          model: cfgModel.value.trim(),
          url: cfgUrl.value.trim(),
          apiKey: cfgApiKey.value.trim(),
        },
      };

      fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cfg),
      })
        .then(res => {
          if (!res.ok) {
            return res.text().then(err => { throw new Error(err); });
          }
          return res.json();
        })
        .then(() => {
          setConfigStatus('Configuration saved!', 'success');
          setTimeout(() => {
            configModal.classList.remove('open');
            clearConfigStatus();
          }, 1000);
        })
        .catch(err => {
          setConfigStatus(`Save failed: ${err.message}`, 'error');
        });
    });

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        cfgProvider.value = cfg.llm.provider || 'auto';
        cfgModel.value = cfg.llm.model || '';
        cfgUrl.value = cfg.llm.url || '';
        cfgApiKey.value = ''; // Don't expose saved key
      } catch (err) {
        setConfigStatus(`Failed to load config: ${err.message}`, 'error');
      }
    }

    function setConfigStatus(msg, type) {
      configStatus.textContent = msg;
      configStatus.className = type;
    }

    function clearConfigStatus() {
      configStatus.textContent = '';
      configStatus.className = '';
    }
  </script>
</body>

</html>
