<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majordomo</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <h1>Majordomo</h1>

            <div class="sidebar-section">
                <button id="new-session-btn" onclick="window.location.href='/'">+ New Chat</button>
            </div>

            <div class="sidebar-section">
                <h3>Sessions</h3>
                <div id="session-list">
                    {{range .Sessions}}
                    <a href="/chat/{{.ID}}" class="session-link {{if eq $.SessionID .ID}}active{{end}}">
                        {{if .Title}}{{.Title}}{{else}}{{.ID}}{{end}}
                    </a>
                    {{else}}
                    <p class="empty-state">No sessions yet</p>
                    {{end}}
                </div>
            </div>

            <div class="sidebar-section">
                <button id="settings-btn" class="settings-btn" title="Settings" onclick="window.location.href='/settings'">⚙ Settings</button>
            </div>
        </aside>

        <main id="content">
            {{block "content" .}}{{end}}
        </main>
    </div>

    <script src="/app.js"></script>
</body>

</html>
