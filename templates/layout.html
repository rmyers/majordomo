<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majordomo</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <h1>Majordomo</h1>

            <div class="sidebar-section">
                <button id="new-session-btn" onclick="window.location.href='/'">+ New Chat</button>
            </div>

            <div class="sidebar-section">
                <h3>Sessions</h3>
                <div id="session-list">
                    {{range .Sessions}}
                    <a href="/chat/{{.ID}}" class="session-link {{if eq $.SessionID .ID}}active{{end}}">
                        {{if .Title}}{{.Title}}{{else}}{{.ID}}{{end}}
                    </a>
                    {{else}}
                    <p class="empty-state">No sessions yet</p>
                    {{end}}
                </div>
            </div>

            <div class="sidebar-section">
                <button id="settings-btn" class="settings-btn" title="Settings">⚙ Settings</button>
            </div>
        </aside>

        <main id="content">
            {{block "content" .}}{{end}}
        </main>
    </div>

    <!-- Config Modal -->
    <div id="config-modal">
        <div id="config-form">
            <h2>LLM Configuration</h2>

            <div class="config-field">
                <label for="cfg-model">Model name (leave empty for default)</label>
                <input type="text" id="cfg-model" placeholder="e.g. mistral, llama">
            </div>

            <div class="config-field">
                <label for="cfg-url">Server URL (leave empty for default)</label>
                <input type="text" id="cfg-url" placeholder="e.g. http://localhost:11434">
            </div>

            <div class="config-field">
                <label for="cfg-apikey">API Key (optional, preserved when saved)</label>
                <input type="password" id="cfg-apikey" placeholder="Bearer token">
            </div>

            <div class="config-actions">
                <button id="cfg-save" class="primary">Save</button>
                <button id="cfg-cancel">Cancel</button>
            </div>
            <div id="config-status"></div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>

</html>
